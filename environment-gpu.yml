name: sqap-montage-gpu
channels:
  - conda-forge
  - nodefaults          # never fall back to the Anaconda default channel
dependencies:
  - python>=3.9
  - click>=8.0
  - mrcfile>=1.4
  - numpy>=1.23
  - tqdm>=4.60
  - pyyaml>=6.0
  # PyTorch with CUDA — conda-forge way:
  # cuda-version pins which CUDA toolkit build is selected.
  # Common values: 11.8, 12.1, 12.4
  # Check your driver with: nvidia-smi (top-right corner shows max CUDA version)
  - cuda-version=12.2
  - pytorch>=2.0
  - torchvision
  - connected-components-3d>=3.0
  - setuptools>=64
  - pip
  - pip:
      - -e ".[gpu]"
