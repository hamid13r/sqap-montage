name: sqap-montage-gpu
channels:
  - conda-forge
  - nodefaults          # never fall back to the Anaconda default channel
dependencies:
  - python>=3.9
  - click>=8.0
  - mrcfile>=1.4
  - numpy>=1.23
  - tqdm>=4.60
  - pyyaml>=6.0
  # PyTorch — conda-forge ships CPU and CUDA builds.
  # Pin pytorch-cuda to the version matching your driver:
  #   CUDA 11.8 → pytorch-cuda=11.8
  #   CUDA 12.1 → pytorch-cuda=12.1
  #   CUDA 12.4 → pytorch-cuda=12.4
  # Leave pytorch-cuda unpinned to let conda pick the newest compatible build.
  - pytorch>=2.0
  - torchvision
  - pytorch-cuda        # omit or pin to force a specific CUDA version
  - connected-components-3d>=3.0
  - setuptools>=64      # required by pyproject.toml build backend
  - pip
  - pip:
      - -e ".[gpu]"
