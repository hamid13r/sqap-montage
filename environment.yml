name: sqap-montage
channels:
  - conda-forge
  - nodefaults          # never fall back to the Anaconda default channel
dependencies:
  - python>=3.9
  - click>=8.0
  - mrcfile>=1.4
  - numpy>=1.23
  - tqdm>=4.60
  - pyyaml>=6.0
  - setuptools>=64      # required by pyproject.toml build backend
  - pip
  - pip:
      - -e .
