# =============================================================================
# sqap-montage pipeline config
# =============================================================================
# Run individual steps:
#   python sqap_montage.py crop      --config pipeline.yaml
#   python sqap_montage.py blend     --config pipeline.yaml
#   python sqap_montage.py fill      --config pipeline.yaml
#   python sqap_montage.py make-mdoc --config pipeline.yaml
#
# Generate a fresh copy of this file:
#   python sqap_montage.py write-config pipeline.yaml
# =============================================================================

# Root directory where your data lives.
# All relative paths below are resolved from here.
data_dir: /data1/users/Krios_Data/HRR/HRR036_1_TEM_250220

# =============================================================================
# Global options
# =============================================================================

# Intermediate .mrc files (IMOD stacks, raw blended MRCs) can be large.
# By default they are deleted from the processing/ dirs once each step
# finishes successfully. Text files (.plin, .plout, .txt, logs) are always
# kept — delete the processing/ folder manually if you want to remove those.
# Set to true to keep the intermediate .mrc files too.
keep_intermediate: false

# Which steps to run. Set any to false to skip.
steps:
  crop:  true
  blend: true
  fill:  true

# =============================================================================
# Step 1: crop_images — remove blank aperture borders from each tile image
# =============================================================================
crop:
  # Input: motion-corrected average MRCs (one per exposure)
  input_dir: frames/averages

  # Output root — creates cropped/averages/ and cropped/frames/ inside
  output_dir: cropped

  # Directory for intermediate boundary coordinate files
  processing_dir: processing/crop

  # Also crop the matching raw frame stacks (true/false)
  crop_frames: true

  # Where to find raw frame MRCs/TIFs (only used if crop_frames: true)
  frames_dir: frames

  # Final tile size in pixels (centred crop)
  crop_x: 3840
  crop_y: 3840

  # Detection parameters — usually don't need changing
  filter_window:  200    # moving-average filter width
  mask_threshold: 0.5    # fraction of peak intensity → illuminated region
  trim:           50     # pixels to shave inside the detected edge

# =============================================================================
# Step 2: blend_tiles — stitch tiles into one tilt-series per angle
# =============================================================================
blend:
  # SerialEM .mrc.mdoc files — one per tile per tilt-series
  mdoc_dir: mdocs

  # Cropped average images from step 1
  averages_dir: cropped/averages

  # Cropped frame stacks from step 1 (only needed if blend_frames: true)
  frames_dir: cropped/frames

  # Output root — creates blended/averages/ and blended/frames/ inside
  output_dir: blended

  # Directory for intermediate stacks, plins, etc.
  processing_dir: processing

  # Output image edge length in pixels after IMOD clip resize
  blend_size: 11664

  # Also blend per-frame stacks in addition to averages (true/false)
  blend_frames: true

  # Number of raw frames per exposure (used when blend_frames: true)
  num_frames: 4

  # Process only these tilt-series names (leave empty [] to process all)
  # Example: ts_filter: [VLP3x3_p01_ts_002, VLP3x3_p01_ts_003]
  ts_filter: []

# =============================================================================
# Step 3: remove_gaps — fill blending-seam artefacts with local texture
# =============================================================================
fill:
  # Blended frame stacks from step 2
  input_dir:  blended/frames

  # Where to write gap-filled output
  output_dir: blended/frames_filled

  # Where to write the binary gap masks (useful for QC)
  mask_dir:   blended/frames_masks

  # GPU IDs to use, comma-separated (e.g. "0,1,2").
  # Use "cpu" to force CPU (much slower).
  gpus: "0"

  # Skip images that already exist in output_dir (true/false)
  resume: true

  # Gap-detection sensitivity (standard deviations from mean)
  sigma: 5.0

  # Grid divisions per axis for local gap filling (8 = 8×8 = 64 tiles)
  tile_num: 8

  # Detection kernels — each entry is [height, width].
  # Tall/wide kernels detect horizontal and vertical seam lines.
  detect_kernels:
    - [301, 3]
    - [3, 301]

  # Dilation kernels — expand the detected gap mask before inpainting.
  # Applied in both auto-detect and manual-seam modes.
  dilate_kernels:
    - [101, 3]
    - [3, 101]
    - [15, 15]

  # Manual seam positions (pixels). Providing these disables auto-detection.
  # Each entry is either a single pixel index or an inclusive range "start-end".
  # Leave as empty lists [] to use auto-detection instead.
  #
  # Examples:
  #   single pixels  → seam_rows: [3840, 7680]
  #   ranges         → seam_rows: ["3838-3842", "7678-7682"]
  #   mixed          → seam_rows: [3840, "7678-7682"]
  #
  # For a 3×3 grid of 3840-px tiles the seam centre lines fall at 3840 and 7680.
  seam_rows: []
  seam_cols: []

# =============================================================================
# Step 4: make-mdoc — build blended .mdoc files from per-tile mdocs
# =============================================================================
make_mdoc:
  # Same per-tile mdocs used by the blend step
  mdoc_dir:    mdocs

  # Blended average images produced by the blend step
  blended_dir: blended/averages

  # Where to write the combined blended .mrc.mdoc files
  output_dir:  blended_mdocs

  # Electron dose delivered per tilt (e-/Å²).
  # ExposureDose = (tilt_index + 0.5) * dose_per_tilt
  dose_per_tilt: 3.0

  # Process only these tilt-series (leave empty [] to process all)
  ts_filter: []

  # Keys to copy from the _0_0 corner tile into the blended mdoc.
  # Remove any key you don't want; leave commented out to use the defaults.
  # keys_to_copy:
  #   - MinMaxMean
  #   - StagePosition
  #   - StageZ
  #   - Magnification
  #   - Intensity
  #   - DoseRate
  #   - PixelSpacing
  #   - SpotSize
  #   - ProbeMode
  #   - ImageShift
  #   - RotationAngle
  #   - TiltAngle
  #   - ExposureTime
  #   - Binning
  #   - CameraIndex
  #   - DividedBy2
  #   - OperatingMode
  #   - UsingCDS
  #   - MagIndex
  #   - LowDoseConSet
  #   - CountsPerElectron
  #   - TargetDefocus
  #   - NumSubFrames
  #   - FrameDosesAndNumber
  #   - DateTime
  #   - FilterSlitAndLoss
  #   - UncroppedSize
  #   - RotationAndFlip
  #   - TimeStamp
  #   - SpecimenShift
  #   - EucentricOffset
  #   - Ctfplotter

# =============================================================================
# Logging
# =============================================================================
logging:
  # Directory for timestamped log files. Set to "" to disable file logging.
  log_dir: logs

  # Log verbosity: DEBUG | INFO | WARNING | ERROR
  level: INFO
